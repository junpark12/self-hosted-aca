name: Deploy to Azure App Service (via self-hosted runner)

# This workflow is designed to run on the ephemeral Azure Container Apps + KEDA
# self-hosted runner described in the accompanying infrastructure doc
# (github-actions-runners-on-aca-keda.md). It builds this simple Node.js app
# and deploys it to an Azure App Service (Linux, Node) instance.
#
# Deploys using the runner's own Azure Managed Identity (Container App Job's
# system-assigned identity) instead of a long-lived publish profile secret.
# The identity must be granted "Website Contributor" (or Contributor) on the
# target App Service resource group/scope beforehand.
#
# Required GitHub variables (Settings -> Secrets and variables -> Actions -> Variables):
#   AZURE_WEBAPP_NAME              -> Name of the target Azure App Service
#   AZURE_RESOURCE_GROUP           -> Resource group containing the App Service
#
# No GitHub secrets required (AZURE_WEBAPP_PUBLISH_PROFILE is no longer used).

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME }}
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  NODE_VERSION: '20.x'

jobs:
  build-and-deploy:
    # 'container-app' label must match RUNNER_LABELS on the Container App Job
    # and the 'labels' metadata on the KEDA github-runner scale rule.
    runs-on: [self-hosted, container-app]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Run tests
        run: npm test

      - name: Deploy to Azure App Service (Managed Identity)
        run: |
          az login --identity
          zip -r package.zip . -x ".git/*"
          az webapp deploy \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --name "${{ env.AZURE_WEBAPP_NAME }}" \
            --src-path package.zip \
            --type zip
